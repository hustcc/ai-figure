<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Branch (Excalidraw, TB)</title>
<style>
  body { margin: 0; padding: 20px; background: #f8f9fa; font-family: sans-serif; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #868e96; margin: 0 0 12px; }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: inline-block; }
</style>
</head>
<body>
  <h2>Decision Branch (Excalidraw, TB)</h2>
  <div class="card"><svg xmlns="http://www.w3.org/2000/svg" width="410" height="472" viewBox="0 0 410 472">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">

<g class="edge" data-from="start" data-to="process">
<path d="M205,76 L205,96 Q205,106 205,116 L205,136" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="process" data-to="decision">
<path d="M205,196 L205,216 Q205,226 205,236 L205,256" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="decision" data-to="success">
<path d="M145,336 L108.32050294337844,360.4529980377477 Q100,366 100,376 L100,396" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="83.5" y="356" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="100" y="366" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Yes</text>
</g>
<g class="edge" data-from="decision" data-to="failure">
<path d="M265,336 L301.6794970566216,360.4529980377477 Q310,366 310,376 L310,396" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="297" y="356" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="310" y="366" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="node node-terminal" data-id="start">
<rect x="125" y="20" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="205" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Start</text>
</g>
<g class="node node-process" data-id="process">
<rect x="125" y="136" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="205" y="166" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Process</text>
</g>
<g class="node node-decision" data-id="decision">
<polygon points="205,256 285,296 205,336 125,296" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="205" y="296" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Is Valid?</text>
</g>
<g class="node node-terminal" data-id="success">
<rect x="20" y="396" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="424" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Success</text>
</g>
<g class="node node-terminal" data-id="failure">
<rect x="230" y="396" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="310" y="424" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Failure</text>
</g>
</g>
</svg></div>
</body>
</html>
