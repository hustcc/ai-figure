<svg xmlns="http://www.w3.org/2000/svg" width="1644" height="130" viewBox="36 14 1644 130">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#555555"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="g1">
<rect x="36" y="14" width="688" height="130" rx="8" fill="rgba(153,153,153,0.06)" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="46" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#999999" font-weight="500">Data Pipeline</text>
</g>
<g class="group" data-id="g2">
<rect x="756" y="14" width="448" height="130" rx="8" fill="rgba(153,153,153,0.06)" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="766" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#999999" font-weight="500">Training</text>
</g>
<g class="group" data-id="g3">
<rect x="1236" y="14" width="208" height="130" rx="8" fill="rgba(153,153,153,0.06)" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="1246" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#999999" font-weight="500">Alignment</text>
</g>
<g class="edge" data-from="raw" data-to="clean">
<path d="M220,90 C240,90 240,90 260,90 C280,90 280,90 300,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="clean" data-to="tokenize">
<path d="M460,90 C480,90 480,90 500,90 C520,90 520,90 540,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="tokenize" data-to="pretrain">
<path d="M700,90 C720,90 720,90 740,90 C760,90 760,90 780,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="pretrain" data-to="sft">
<path d="M940,90 C960,90 960,90 980,90 C1000,90 1000,90 1020,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="sft" data-to="rlhf">
<path d="M1180,90 C1200,90 1200,90 1220,90 C1240,90 1240,90 1260,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="rlhf" data-to="deploy">
<path d="M1420,90 C1440,90 1440,90 1460,90 C1480,90 1480,90 1500,90" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-io" data-id="raw">
<polygon points="74,60 220,60 206,120 60,120" fill="#fdf2f8" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
<text x="140" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">Raw Data</text>
</g>
<g class="node node-process" data-id="clean">
<rect x="300" y="60" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="380" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Preprocess</text>
</g>
<g class="node node-process" data-id="tokenize">
<rect x="540" y="60" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="620" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Tokenize</text>
</g>
<g class="node node-process" data-id="pretrain">
