<text x="860" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Pretrain</text>
</g>
<g class="node node-process" data-id="sft">
<rect x="1020" y="60" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="1100" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Fine-tune</text>
</g>
<g class="node node-process" data-id="rlhf">
<rect x="1260" y="60" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="1340" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">RLHF</text>
</g>
<g class="node node-terminal" data-id="deploy">
<rect x="1500" y="62" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="1580" y="90" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Deploy Model</text>
</g>
</g>
</svg>