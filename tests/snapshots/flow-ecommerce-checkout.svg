<svg xmlns="http://www.w3.org/2000/svg" width="476" height="1172" viewBox="-28 -28 476 1172">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="checkout">
<rect x="106" y="410" width="208" height="410" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="116" y="428" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Checkout</text>
</g>
<g class="edge" data-from="cart" data-to="login_check">
<path d="M210,76 L210,106 Q210,116 210,126 L210,156" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="login_check" data-to="address">
<path d="M180,236 L156,268 Q150,276 150,286 L150,336 Q150,346 150,356 L150,406 Q150,416 156.50791373455968,423.592566023653 L184.28571428571428,456" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="133.5" y="336" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="150" y="346" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Yes</text>
</g>
<g class="edge" data-from="login_check" data-to="login">
<path d="M240,236 L264,268 Q270,276 270,286 L270,316" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="257" y="266" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="270" y="276" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="edge" data-from="login" data-to="address">
<path d="M270,376 L270,406 Q270,416 263.4920862654403,423.592566023653 L235.71428571428572,456" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="address" data-to="shipping">
<path d="M210,516 L210,546 Q210,556 210,566 L210,596" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="shipping" data-to="payment">
<path d="M210,656 L210,686 Q210,696 210,706 L210,736" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="payment" data-to="validate">
<path d="M167.14285714285714,796 L118.1923192051904,830.2653765563667 Q110,836 110,846 L110,876" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="validate" data-to="confirm">
<path d="M105,956 L101.24034734589209,986.0772212328633 Q100,996 100,1006 L100,1038" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="87" y="986" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="100" y="996" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">OK</text>
</g>
<g class="edge" data-from="validate" data-to="retry">
<path d="M165,956 L211.9126391569681,990.1182830232495 Q220,996 228.19231920519042,1001.7346234436333 L277.14285714285717,1036" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="200" y="986" width="40" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="220" y="996" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Fail</text>
</g>
<g class="edge" data-from="retry" data-to="payment">
<path d="M324.2857142857143,1036 L328.5857864376269,1005.8994949366116 Q330,996 330,986 L330,926 Q330,916 330,906 L330,846 Q330,836 321.3622109910157,830.9612897447591 L261.42857142857144,796" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-terminal" data-id="cart">
<rect x="130" y="20" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="210" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">View Cart</text>
</g>
<g class="node node-decision" data-id="login_check">
<polygon points="210,156 290,196 210,236 130,196" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="196" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Logged In?</text>
</g>
<g class="node node-io" data-id="login">
<polygon points="204,316 350,316 336,376 190,376" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="270" y="346" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Login / Register</text>
</g>
<g class="node node-io" data-id="address">
<polygon points="144,456 290,456 276,516 130,516" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="486" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Enter Address</text>
</g>
<g class="node node-process" data-id="shipping">
<rect x="130" y="596" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="210" y="626" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Choose Shipping</text>
</g>
<g class="node node-io" data-id="payment">
<polygon points="144,736 290,736 276,796 130,796" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="766" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Enter Payment</text>
</g>
<g class="node node-decision" data-id="validate">
<polygon points="110,876 190,916 110,956 30,916" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="110" y="916" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Payment Valid?</text>
</g>
<g class="node node-terminal" data-id="confirm">
<rect x="20" y="1038" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="1066" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Order Confirmed</text>
</g>
<g class="node node-process" data-id="retry">
<rect x="240" y="1036" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="320" y="1066" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Retry Payment</text>
</g>
</g>
</svg>