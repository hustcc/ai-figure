</g>
<g class="edge" data-from="ok" data-to="save">
<path d="M620,64.72727272727272 L641.0233238943823,54.40673190639414 Q650,50 660,50 L680,50" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="633.5" y="40" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="650" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Yes</text>
</g>
<g class="edge" data-from="ok" data-to="retry">
