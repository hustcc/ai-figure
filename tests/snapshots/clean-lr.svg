<svg xmlns="http://www.w3.org/2000/svg" width="976" height="272" viewBox="-28 -28 976 272">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#555555"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">

<g class="edge" data-from="read" data-to="parse">
<path d="M180,109 L210,109 Q220,109 230,109 L260,109" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="parse" data-to="ok">
<path d="M420,109 L450,109 Q460,109 470,109 L500,109" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="ok" data-to="save">
<path d="M660,69.66666666666666 L691.0260148929267,54.41220934431106 Q700,50 710,50 L740,50" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="683.5" y="40" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="700" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Yes</text>
</g>
<g class="edge" data-from="ok" data-to="retry">
<path d="M660,148.33333333333334 L691.0260148929267,163.58779065568893 Q700,168 710,168 L740,168" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="687" y="158" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="700" y="168" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">No</text>
</g>
<g class="node node-io" data-id="read">
<polygon points="34,79 180,79 166,139 20,139" fill="#fdf2f8" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
<text x="100" y="109" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">Read File</text>
</g>
<g class="node node-process" data-id="parse">
<rect x="260" y="79" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="340" y="109" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Parse</text>
</g>
<g class="node node-decision" data-id="ok">
<polygon points="580,69 660,109 580,149 500,109" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" stroke-linejoin="round"/>
<text x="580" y="109" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e65100">OK?</text>
</g>
<g class="node node-process" data-id="save">
<rect x="740" y="20" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="820" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Save</text>
</g>
<g class="node node-terminal" data-id="retry">
<rect x="740" y="140" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="820" y="168" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Retry</text>
</g>
</g>
</svg>