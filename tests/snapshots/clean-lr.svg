<rect x="637" y="148" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="650" y="158" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">No</text>
</g>
<g class="node node-io" data-id="read">
<polygon points="34,74 180,74 166,134 20,134" fill="#fdf2f8" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
<text x="100" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">Read File</text>
</g>
<g class="node node-process" data-id="parse">
<rect x="240" y="74" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="320" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Parse</text>
</g>
<g class="node node-decision" data-id="ok">
<polygon points="540,64 620,104 540,144 460,104" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" stroke-linejoin="round"/>
