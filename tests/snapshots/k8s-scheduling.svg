<svg xmlns="http://www.w3.org/2000/svg" width="571" height="1128" viewBox="-28 -28 571 1128">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#555555"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="control">
<rect x="-4" y="90" width="418" height="250" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="6" y="108" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Control Plane</text>
</g>
<g class="group" data-id="sched">
<rect x="101" y="330" width="313" height="510" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="111" y="348" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Scheduling</text>
</g>
<g class="group" data-id="node">
<rect x="101" y="830" width="208" height="246" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="111" y="848" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Worker Node</text>
</g>
<g class="edge" data-from="pod" data-to="apiserver">
<path d="M205,76 L205,96 Q205,106 205,116 L205,136" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="apiserver" data-to="etcd">
<path d="M152.5,196 L108.68243142124459,221.03861061643167 Q100,226 100,236 L100,256" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="apiserver" data-to="scheduler">
<path d="M257.5,196 L301.3175685787554,221.03861061643167 Q310,226 310,236 L310,256" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="scheduler" data-to="filter">
<path d="M310,316 L310,336 Q310,346 310,356 L310,376" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="filter" data-to="score">
<path d="M310,436 L310,456 Q310,466 310,476 L310,496" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="score" data-to="best_node">
<path d="M310,556 L310,576 Q310,586 310,596 L310,616" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="best_node" data-to="bind">
<path d="M250,696 L213.32050294337844,720.4529980377478 Q205,726 205,736 L205,756" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="188.5" y="716" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="205" y="726" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Yes</text>
</g>
<g class="edge" data-from="best_node" data-to="pending">
<path d="M370,696 L406.6794970566216,720.4529980377478 Q415,726 415,736 L415,758" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="402" y="716" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="415" y="726" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">No</text>
</g>
<g class="edge" data-from="bind" data-to="kubelet">
<path d="M205,816 L205,836 Q205,846 205,856 L205,876" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="kubelet" data-to="running">
<path d="M205,936 L205,956 Q205,966 205,976 L205,996" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-terminal" data-id="pod">
<rect x="125" y="20" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="205" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">New Pod</text>
</g>
<g class="node node-process" data-id="apiserver">
<rect x="125" y="136" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="205" y="166" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kube-apiserver</text>
</g>
<g class="node node-io" data-id="etcd">
<polygon points="34,256 180,256 166,316 20,316" fill="#fdf2f8" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
<text x="100" y="286" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">etcd (persist)</text>
</g>
<g class="node node-process" data-id="scheduler">
<rect x="230" y="256" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="310" y="286" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kube-scheduler</text>
</g>
<g class="node node-process" data-id="filter">
<rect x="230" y="376" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="310" y="406" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Filter Nodes</text>
</g>
<g class="node node-process" data-id="score">
<rect x="230" y="496" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="310" y="526" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Score Nodes</text>
</g>
<g class="node node-decision" data-id="best_node">
<polygon points="310,616 390,656 310,696 230,656" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" stroke-linejoin="round"/>
<text x="310" y="656" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e65100">Best Node Found?</text>
</g>
<g class="node node-process" data-id="bind">
<rect x="125" y="756" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="205" y="786" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Bind Pod → Node</text>
</g>
<g class="node node-process" data-id="kubelet">
<rect x="125" y="876" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="205" y="896.1999999999999" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kubelet pulls</text>
<text x="205" y="915.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">image</text>
</g>
<g class="node node-terminal" data-id="running">
<rect x="125" y="996" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="205" y="1024" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Pod Running</text>
</g>
<g class="node node-terminal" data-id="pending">
<rect x="335" y="758" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="415" y="786" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Pod Pending</text>
</g>
</g>
</svg>