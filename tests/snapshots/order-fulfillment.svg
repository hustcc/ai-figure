<text x="205" y="166" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Fraud Check</text>
</g>
<g class="node node-decision" data-id="fraud_ok">
<polygon points="205,256 285,296 205,336 125,296" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="205" y="296" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Fraud Detected?</text>
</g>
<g class="node node-terminal" data-id="cancel">
