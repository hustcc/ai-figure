<text x="310" y="426" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Charge Payment</text>
</g>
<g class="node node-decision" data-id="pay_ok">
<polygon points="310,516 390,556 310,596 230,556" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="310" y="556" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Payment OK?</text>
</g>
<g class="node node-io" data-id="refund">
<polygon points="139,656 285,656 271,716 125,716" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="205" y="686" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Notify Failure</text>
</g>
<g class="node node-process" data-id="reserve">
<rect x="335" y="656" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
