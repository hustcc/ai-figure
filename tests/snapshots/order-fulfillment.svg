<rect x="185" y="616" width="40" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="205" y="626" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Fail</text>
</g>
<g class="edge" data-from="reserve" data-to="pick">
