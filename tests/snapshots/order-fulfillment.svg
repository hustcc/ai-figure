<rect x="402" y="616" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="415" y="626" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">OK</text>
</g>
<g class="edge" data-from="pay_ok" data-to="refund">
