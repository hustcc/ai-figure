</g>
<g class="node node-terminal" data-id="delivered">
<rect x="335" y="1136" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="415" y="1164" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Delivered</text>
</g>
</g>
