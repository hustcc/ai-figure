</g>
<g class="node node-process" data-id="label">
<rect x="335" y="896" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="415" y="916.1999999999999" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Print Shipping</text>
<text x="415" y="935.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Label</text>
</g>
<g class="node node-process" data-id="ship">
<rect x="335" y="1016" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
