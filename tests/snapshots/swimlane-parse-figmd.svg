<svg xmlns="http://www.w3.org/2000/svg" width="500" height="268" viewBox="0 0 500 268">
<text x="250" y="34" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#495057">Order Flow</text>
<g class="swimlane-diagram" transform="translate(0,48)">
<defs><marker id="sw-1-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/></marker></defs>
<rect x="0" y="0" width="500" height="110" fill="none" stroke="none"/>
<line x1="0" y1="0" x2="500" y2="0" stroke="#868e96" stroke-width="1"/>
<rect x="0" y="0" width="120" height="110" fill="rgba(134,142,150,0.06)" stroke="none"/>
<line x1="120" y1="0" x2="120" y2="110" stroke="#868e96" stroke-width="1"/>
<text x="60" y="55" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#495057">Customer</text>
<rect x="0" y="110" width="500" height="110" fill="rgba(134,142,150,0.06)" stroke="none"/>
<line x1="0" y1="110" x2="500" y2="110" stroke="#868e96" stroke-width="1"/>
<rect x="0" y="110" width="120" height="110" fill="rgba(134,142,150,0.06)" stroke="none"/>
<line x1="120" y1="110" x2="120" y2="220" stroke="#868e96" stroke-width="1"/>
<text x="60" y="165" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#495057">Ops</text>
<line x1="0" y1="220" x2="500" y2="220" stroke="#868e96" stroke-width="1"/>
<path d="M228,80 C228,110 228,110 228,140" fill="none" stroke="#495057" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#sw-1-arrow)"><animate attributeName="stroke-dashoffset" from="0" to="-20" dur="0.8s" repeatCount="indefinite"/></path>
<rect x="152" y="30" width="152" height="50" rx="8" ry="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
<text x="228" y="55" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1971c2">Place Order</text>
<rect x="152" y="140" width="152" height="50" rx="8" ry="8" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="228" y="165" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2f9e44">Process Order</text>
</g>
</svg>