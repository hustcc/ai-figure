<text x="100" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">User Query</text>
</g>
<g class="node node-process" data-id="embed_q">
