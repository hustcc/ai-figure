<text x="820" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Top-K Chunks</text>
</g>
<g class="node node-process" data-id="rerank">
