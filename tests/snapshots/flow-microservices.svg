<rect x="287.16" y="547" width="65.67999999999999" height="18" fill="white" rx="3" opacity="0.9"/>
<text x="320" y="556" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Exceeded</text>
</g>
