<svg xmlns="http://www.w3.org/2000/svg" width="696" height="1192" viewBox="-28 -28 696 1192">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="auto">
<rect x="216" y="114" width="428" height="590" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="226" y="132" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Automated Checks</text>
</g>
<g class="group" data-id="manual">
<rect x="426" y="714" width="208" height="290" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="436" y="732" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Manual Review</text>
</g>
<g class="edge" data-from="post" data-to="hash_check">
<path d="M320,80 L320,110 Q320,120 320,130 L320,160" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="hash_check" data-to="hash_hit">
<path d="M320,220 L320,250 Q320,260 320,270 L320,300" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="hash_hit" data-to="auto_remove">
<path d="M240,369.09090909090907 L109.39793423488437,416.58256936913295 Q100,420 100,430 L100,462" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="83.5" y="410" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="100" y="420" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Yes</text>
</g>
<g class="edge" data-from="hash_hit" data-to="text_scan">
<path d="M320,380 L320,410 Q320,420 320,430 L320,460" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="307" y="410" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="320" y="420" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="edge" data-from="hash_hit" data-to="image_scan">
<path d="M400,369.09090909090907 L530.6020657651156,416.58256936913295 Q540,420 540,430 L540,460" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="527" y="410" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="540" y="420" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="edge" data-from="text_scan" data-to="risk">
<path d="M320,520 L320,550 Q320,560 328.0873608430319,565.8817169767505 L375,600" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="image_scan" data-to="risk">
<path d="M540,520 L540,550 Q540,560 531.9126391569681,565.8817169767505 L485,600" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="risk" data-to="human">
<path d="M480,680 L522.1913119055697,713.7530495244557 Q530,720 530,730 L530,760" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="510" y="710" width="40" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="530" y="720" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">High</text>
</g>
<g class="edge" data-from="risk" data-to="approve">
<path d="M370,680 L318.3205029433784,714.4529980377478 Q310,720 310,730 L310,780 Q310,790 310,800 L310,850 Q310,860 310,870 L310,930 Q310,940 310,950 L310,1010 Q310,1020 311.45493990494833,1029.8935913536486 L315.88235294117646,1060" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="293.5" y="850" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="310" y="860" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Low</text>
</g>
<g class="edge" data-from="human" data-to="reviewer">
<path d="M530,820 L530,850 Q530,860 530,870 L530,900" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="reviewer" data-to="approve">
<path d="M475,980 L428.0873608430319,1014.1182830232495 Q420,1020 411.7307349793047,1025.6231002140728 L361.1764705882353,1060" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="407" y="1010" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="420" y="1020" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">OK</text>
</g>
<g class="edge" data-from="reviewer" data-to="remove">
<path d="M535,980 L538.7596526541079,1010.0772212328633 Q540,1020 540,1030 L540,1060" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="506" y="1010" width="68" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="540" y="1020" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Violates</text>
</g>
<g class="node node-io" data-id="post">
<polygon points="254,20 400,20 386,80 240,80" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="320" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">User Post</text>
</g>
<g class="node node-process" data-id="hash_check">
<rect x="240" y="160" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="320" y="190" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Hash Blocklist</text>
</g>
<g class="node node-decision" data-id="hash_hit">
<polygon points="320,300 400,340 320,380 240,340" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="320" y="340" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Blocked Hash?</text>
</g>
<g class="node node-terminal" data-id="auto_remove">
<rect x="20" y="462" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="490" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Auto Remove</text>
</g>
<g class="node node-process" data-id="text_scan">
<rect x="240" y="460" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="320" y="490" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Text Classifier</text>
</g>
<g class="node node-process" data-id="image_scan">
<rect x="460" y="460" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="540" y="490" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Image Classifier</text>
</g>
<g class="node node-decision" data-id="risk">
<polygon points="430,600 510,640 430,680 350,640" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="430" y="640" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Risk Score &gt; 0.8?</text>
</g>
<g class="node node-process" data-id="human">
<rect x="450" y="760" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="530" y="780.1999999999999" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Human Review</text>
<text x="530" y="799.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Queue</text>
</g>
<g class="node node-decision" data-id="reviewer">
<polygon points="530,900 610,940 530,980 450,940" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="530" y="940" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Reviewer Decision</text>
</g>
<g class="node node-terminal" data-id="approve">
<rect x="240" y="1060" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="320" y="1088" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Approve &amp; Publish</text>
</g>
<g class="node node-terminal" data-id="remove">
<rect x="460" y="1060" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="540" y="1088" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Remove &amp; Notify</text>
</g>
</g>
</svg>