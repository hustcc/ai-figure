<text x="215" y="866" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Fail</text>
</g>
<g class="edge" data-from="retry" data-to="payment">
<path d="M315,896 L318.35601012694644,875.8639392383214 Q320,866 320,856 L320,806 Q320,796 320,786 L320,736 Q320,726 311.13415153834546,721.3743399330498 L262.5,696" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-terminal" data-id="cart">
