</g>
<g class="node node-decision" data-id="validate">
<polygon points="110,756 190,796 110,836 30,796" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="110" y="796" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Payment Valid?</text>
</g>
<g class="node node-terminal" data-id="confirm">
