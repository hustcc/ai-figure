<rect x="249.5" y="236" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="262.5" y="246" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
