<text x="205" y="546" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Choose Shipping</text>
</g>
<g class="node node-io" data-id="payment">
