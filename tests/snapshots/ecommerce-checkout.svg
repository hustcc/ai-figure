<text x="100" y="926" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Order Confirmed</text>
</g>
<g class="node node-process" data-id="retry">
