<svg xmlns="http://www.w3.org/2000/svg" width="476" height="592" viewBox="-28 -28 476 592">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="g1">
<rect x="106" y="114" width="208" height="290" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="116" y="132" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Validation</text>
</g>
<g class="edge" data-from="input" data-to="parse">
<path d="M210,80 L210,110 Q210,120 210,130 L210,160" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="parse" data-to="valid">
<path d="M210,220 L210,250 Q210,260 210,270 L210,300" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="valid" data-to="save">
<path d="M155,380 L108.08736084303189,414.11828302324955 Q100,420 100,430 L100,460" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="83.5" y="410" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="100" y="420" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Yes</text>
</g>
<g class="edge" data-from="valid" data-to="error">
<path d="M265,380 L311.9126391569681,414.11828302324955 Q320,420 320,430 L320,460" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="307" y="410" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="320" y="420" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="node node-io" data-id="input">
<polygon points="144,20 290,20 276,80 130,80" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">User Input</text>
</g>
<g class="node node-process" data-id="parse">
<rect x="130" y="160" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="210" y="190" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Parse</text>
</g>
<g class="node node-decision" data-id="valid">
<polygon points="210,300 290,340 210,380 130,340" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="340" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Valid?</text>
</g>
<g class="node node-terminal" data-id="save">
<rect x="20" y="460" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Save</text>
</g>
<g class="node node-terminal" data-id="error">
<rect x="240" y="460" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="320" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Error</text>
</g>
</g>
</svg>