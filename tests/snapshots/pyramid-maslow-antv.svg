<svg xmlns="http://www.w3.org/2000/svg" width="480" height="423" viewBox="0 0 480 423" id="py-1">
<text x="240" y="34" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#495057">Maslow&apos;s Hierarchy</text>
<text x="240" y="53" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#868e96">Five-tier model of human motivation</text>
<g class="pyramid-diagram" transform="translate(0,67)">
<polygon points="224,32 256,32 302,92 178,92" fill="#fff4ef" stroke="#e8684a" stroke-width="1"/>
<text x="240" y="57" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#bf3c22">Self-Actualisation</text>
<text x="240" y="74" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#bf3c22" opacity="0.75">achieving full potential</text>
<polygon points="178,92 302,92 348,152 132,152" fill="#edfaf5" stroke="#5ad8a6" stroke-width="1"/>
<text x="240" y="117" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1c9c6f">Esteem</text>
<text x="240" y="134" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#1c9c6f" opacity="0.75">respect and recognition</text>
<polygon points="132,152 348,152 394,212 86,212" fill="#f5f0fd" stroke="#9270ca" stroke-width="1"/>
<text x="240" y="177" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#5e3b9e">Love &amp; Belonging</text>
<text x="240" y="194" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#5e3b9e" opacity="0.75">relationships and community</text>
<polygon points="86,212 394,212 440,272 40,272" fill="#fff4ef" stroke="#e8684a" stroke-width="1"/>
<text x="240" y="237" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#bf3c22">Safety</text>
<text x="240" y="254" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#bf3c22" opacity="0.75">security and stability</text>
<polygon points="40,272 440,272 440,332 40,332" fill="#eff4ff" stroke="#5b8ff9" stroke-width="1"/>
<text x="240" y="297" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1d5bc7">Physiological</text>
<text x="240" y="314" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#1d5bc7" opacity="0.75">food, water and shelter</text>
</g>
</svg>