<svg xmlns="http://www.w3.org/2000/svg" width="476" height="588" viewBox="-28 -28 476 588">
<defs>
    <marker id="fc-1-arrow" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">

<g class="edge" data-from="start" data-to="process">
<path d="M210,76 L210,106 Q210,116 210,126 L210,156" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-1-arrow)"/>

</g>
<g class="edge" data-from="process" data-to="decision">
<path d="M210,216 L210,246 Q210,256 210,266 L210,296" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-1-arrow)"/>

</g>
<g class="edge" data-from="decision" data-to="success">
<path d="M155,376 L108.08736084303189,410.11828302324955 Q100,416 100,426 L100,456" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-1-arrow)"/>
<rect x="84.56" y="407" width="30.879999999999995" height="18" fill="white" rx="3" opacity="0.9"/>
<text x="100" y="416" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Yes</text>
</g>
<g class="edge" data-from="decision" data-to="failure">
<path d="M265,376 L311.9126391569681,410.11828302324955 Q320,416 320,426 L320,456" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-1-arrow)"/>
<rect x="308.04" y="407" width="23.919999999999998" height="18" fill="white" rx="3" opacity="0.9"/>
<text x="320" y="416" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">No</text>
</g>
<g class="node node-terminal" data-id="start">
<rect x="130" y="20" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="210" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Start</text>
</g>
<g class="node node-process" data-id="process">
<rect x="130" y="156" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="210" y="186" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Process</text>
</g>
<g class="node node-decision" data-id="decision">
<polygon points="210,296 290,336 210,376 130,336" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="210" y="336" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Is Valid?</text>
</g>
<g class="node node-terminal" data-id="success">
<rect x="20" y="456" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="484" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Success</text>
</g>
<g class="node node-terminal" data-id="failure">
<rect x="240" y="456" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="320" y="484" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Failure</text>
</g>
</g>
</svg>