<svg xmlns="http://www.w3.org/2000/svg" width="586" height="1288" viewBox="-28 -28 586 1288">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#555555"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="control">
<rect x="-4" y="110" width="428" height="270" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="6" y="128" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Control Plane</text>
</g>
<g class="group" data-id="sched">
<rect x="106" y="390" width="318" height="570" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="116" y="408" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Scheduling</text>
</g>
<g class="group" data-id="node">
<rect x="106" y="970" width="208" height="266" rx="8" fill="rgba(85,85,85,0.06)" stroke="#555555" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="116" y="988" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" font-weight="500">Worker Node</text>
</g>
<g class="edge" data-from="pod" data-to="apiserver">
<path d="M210,76 L210,106 Q210,116 210,126 L210,156" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="apiserver" data-to="etcd">
<path d="M162.85714285714286,216 L108.43661487732108,250.63124507806842 Q100,256 100,266 L100,296" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="apiserver" data-to="scheduler">
<path d="M257.14285714285717,216 L311.56338512267894,250.63124507806842 Q320,256 320,266 L320,296" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="scheduler" data-to="filter">
<path d="M320,356 L320,386 Q320,396 320,406 L320,436" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="filter" data-to="score">
<path d="M320,496 L320,526 Q320,536 320,546 L320,576" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="score" data-to="best_node">
<path d="M320,636 L320,666 Q320,676 320,686 L320,716" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="best_node" data-to="bind">
<path d="M265,796 L218.0873608430319,830.1182830232495 Q210,836 210,846 L210,876" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="193.5" y="826" width="33" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="210" y="836" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Yes</text>
</g>
<g class="edge" data-from="best_node" data-to="pending">
<path d="M375,796 L421.9126391569681,830.1182830232495 Q430,836 430,846 L430,878" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="417" y="826" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="430" y="836" dy="0.35em" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">No</text>
</g>
<g class="edge" data-from="bind" data-to="kubelet">
<path d="M210,936 L210,966 Q210,976 210,986 L210,1016" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="kubelet" data-to="running">
<path d="M210,1076 L210,1106 Q210,1116 210,1126 L210,1156" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-terminal" data-id="pod">
<rect x="130" y="20" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="210" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">New Pod</text>
</g>
<g class="node node-process" data-id="apiserver">
<rect x="130" y="156" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="210" y="186" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kube-apiserver</text>
</g>
<g class="node node-io" data-id="etcd">
<polygon points="34,296 180,296 166,356 20,356" fill="#fdf2f8" stroke="#8e44ad" stroke-width="1.5" stroke-linejoin="round"/>
<text x="100" y="326" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#6a1b9a">etcd (persist)</text>
</g>
<g class="node node-process" data-id="scheduler">
<rect x="240" y="296" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="320" y="326" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kube-scheduler</text>
</g>
<g class="node node-process" data-id="filter">
<rect x="240" y="436" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="320" y="466" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Filter Nodes</text>
</g>
<g class="node node-process" data-id="score">
<rect x="240" y="576" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="320" y="606" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Score Nodes</text>
</g>
<g class="node node-decision" data-id="best_node">
<polygon points="320,716 400,756 320,796 240,756" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" stroke-linejoin="round"/>
<text x="320" y="756" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e65100">Best Node Found?</text>
</g>
<g class="node node-process" data-id="bind">
<rect x="130" y="876" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="210" y="906" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">Bind Pod → Node</text>
</g>
<g class="node node-process" data-id="kubelet">
<rect x="130" y="1016" width="160" height="60" rx="6" ry="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="1.5"/>
<text x="210" y="1036.2" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">kubelet pulls</text>
<text x="210" y="1055.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1565c0">image</text>
</g>
<g class="node node-terminal" data-id="running">
<rect x="130" y="1156" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="210" y="1184" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Pod Running</text>
</g>
<g class="node node-terminal" data-id="pending">
<rect x="350" y="878" width="160" height="56" rx="28" ry="28" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
<text x="430" y="906" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20">Pod Pending</text>
</g>
</g>
</svg>