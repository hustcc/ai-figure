</g>
<g class="node node-process" data-id="inventory_svc">
<rect x="1460" y="20" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="1540" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Inventory Service</text>
</g>
<g class="node node-io" data-id="notify_svc">
<polygon points="1714,20 1860,20 1846,80 1700,80" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="1780" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Notify Service</text>
</g>
<g class="node node-terminal" data-id="response">
<rect x="1940" y="22" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
