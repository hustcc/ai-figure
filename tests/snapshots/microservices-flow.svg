<rect x="906" y="158" width="68" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="940" y="168" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Exceeded</text>
</g>
<g class="edge" data-from="user_svc" data-to="order_svc">
