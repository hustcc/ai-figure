</g>
<g class="node node-terminal" data-id="throttle">
<rect x="980" y="140" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="1060" y="158.20000000000002" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">429 Too Many</text>
<text x="1060" y="177.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Requests</text>
</g>
</g>
</svg>