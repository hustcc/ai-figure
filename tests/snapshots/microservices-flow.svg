<svg xmlns="http://www.w3.org/2000/svg" width="2016" height="262" viewBox="-28 -28 2016 262">
<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<g class="flowchart">
<g class="group" data-id="edge_layer">
<rect x="216" y="18" width="648" height="150" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="226" y="36" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Edge Layer</text>
</g>
<g class="group" data-id="business">
<rect x="876" y="-26" width="868" height="130" rx="8" fill="rgba(134,142,150,0.06)" stroke="#868e96" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="886" y="-8" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#868e96" font-weight="500">Business Services</text>
</g>
<g class="edge" data-from="client" data-to="gateway">
<path d="M180,104 L200,104 Q210,104 220,104 L240,104" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="gateway" data-to="auth_svc">
<path d="M400,104 L420,104 Q430,104 440,104 L460,104" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="auth_svc" data-to="rate_limit">
<path d="M620,104 L640,104 Q650,104 660,104 L680,104" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="rate_limit" data-to="user_svc">
<path d="M840,64.72727272727272 L861.0233238943823,54.40673190639414 Q870,50 880,50 L900,50" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="857" y="40" width="26" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="870" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">OK</text>
</g>
<g class="edge" data-from="rate_limit" data-to="throttle">
<path d="M840,143.27272727272728 L861.0233238943823,153.59326809360584 Q870,158 880,158 L900,158" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>
<rect x="836" y="148" width="68" height="20" fill="white" rx="3" opacity="0.9"/>
<text x="870" y="158" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#495057">Exceeded</text>
</g>
<g class="edge" data-from="user_svc" data-to="order_svc">
<path d="M1060,50 L1080,50 Q1090,50 1100,50 L1120,50" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="order_svc" data-to="inventory_svc">
<path d="M1280,50 L1300,50 Q1310,50 1320,50 L1340,50" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="inventory_svc" data-to="notify_svc">
<path d="M1500,50 L1520,50 Q1530,50 1540,50 L1560,50" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="edge" data-from="notify_svc" data-to="response">
<path d="M1720,50 L1740,50 Q1750,50 1760,50 L1780,50" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#arrowhead)"/>

</g>
<g class="node node-terminal" data-id="client">
<rect x="20" y="76" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Client</text>
</g>
<g class="node node-process" data-id="gateway">
<rect x="240" y="74" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="320" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">API Gateway</text>
</g>
<g class="node node-process" data-id="auth_svc">
<rect x="460" y="74" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="540" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Auth Service</text>
</g>
<g class="node node-decision" data-id="rate_limit">
<polygon points="760,64 840,104 760,144 680,104" fill="#e7f5ff" stroke="#339af0" stroke-width="2" stroke-linejoin="round"/>
<text x="760" y="104" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Rate Limit?</text>
</g>
<g class="node node-process" data-id="user_svc">
<rect x="900" y="20" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="980" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">User Service</text>
</g>
<g class="node node-process" data-id="order_svc">
<rect x="1120" y="20" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="1200" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Order Service</text>
</g>
<g class="node node-process" data-id="inventory_svc">
<rect x="1340" y="20" width="160" height="60" rx="6" ry="6" fill="#fff7e6" stroke="#f59f00" stroke-width="2"/>
<text x="1420" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#e67700">Inventory Service</text>
</g>
<g class="node node-io" data-id="notify_svc">
<polygon points="1574,20 1720,20 1706,80 1560,80" fill="#fdf4ff" stroke="#cc5de8" stroke-width="2" stroke-linejoin="round"/>
<text x="1640" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#862e9c">Notify Service</text>
</g>
<g class="node node-terminal" data-id="response">
<rect x="1780" y="22" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="1860" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Response</text>
</g>
<g class="node node-terminal" data-id="throttle">
<rect x="900" y="130" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="980" y="148.20000000000002" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">429 Too Many</text>
<text x="980" y="167.8" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Requests</text>
</g>
</g>
</svg>