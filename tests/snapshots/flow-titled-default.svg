<svg xmlns="http://www.w3.org/2000/svg" width="256" height="495" viewBox="-28 -95 256 495">
<defs>
    <marker id="fc-5-arrow" markerWidth="8" markerHeight="6"
      refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6, 1.5 3" fill="#495057"/>
    </marker>
    <style>
      @keyframes ai-fc-flow { to { stroke-dashoffset: -26; } }
      .ai-fc-edge { animation: ai-fc-flow 1.2s linear infinite; }
    </style>
  </defs>
<text x="100" y="-61" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#495057">Order Processing</text>
<text x="100" y="-42" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#868e96">E-commerce checkout pipeline</text>
<g class="flowchart">

<g class="edge" data-from="cart" data-to="payment">
<path d="M100,76 L100,106 Q100,116 100,126 L100,156" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-5-arrow)"/>

</g>
<g class="edge" data-from="payment" data-to="confirm">
<path d="M100,216 L100,246 Q100,256 100,266 L100,296" fill="none" stroke="#495057" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" class="ai-fc-edge" marker-end="url(#fc-5-arrow)"/>

</g>
<g class="node node-terminal" data-id="cart">
<rect x="20" y="20" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="48" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Cart</text>
</g>
<g class="node node-process" data-id="payment">
<rect x="20" y="156" width="160" height="60" rx="6" ry="6" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
<text x="100" y="186" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#1971c2">Payment</text>
</g>
<g class="node node-terminal" data-id="confirm">
<rect x="20" y="296" width="160" height="56" rx="28" ry="28" fill="#ebfbee" stroke="#51cf66" stroke-width="2"/>
<text x="100" y="324" text-anchor="middle" dominant-baseline="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#2f9e44">Confirm</text>
</g>
</g>
</svg>